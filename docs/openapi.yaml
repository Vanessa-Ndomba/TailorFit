components:
  schemas:
    CoverLetterCreate:
      properties:
        content:
          description: Cover letter content
          minLength: 1
          title: Content
          type: string
        status:
          default: draft
          description: 'Status: draft or finalized'
          title: Status
          type: string
        template_version:
          default: '1.0'
          description: Template version
          title: Template Version
          type: string
      required:
      - content
      title: CoverLetterCreate
      type: object
    CoverLetterResponse:
      properties:
        content:
          title: Content
          type: string
        id:
          title: Id
          type: string
        status:
          title: Status
          type: string
        template_version:
          title: Template Version
          type: string
      required:
      - id
      - content
      - status
      - template_version
      title: CoverLetterResponse
      type: object
    CoverLetterUpdate:
      properties:
        content:
          description: Updated content
          minLength: 1
          title: Content
          type: string
      required:
      - content
      title: CoverLetterUpdate
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    JobDescriptionCreate:
      properties:
        text:
          description: Job description text
          minLength: 1
          title: Text
          type: string
      required:
      - text
      title: JobDescriptionCreate
      type: object
    JobDescriptionResponse:
      properties:
        id:
          title: Id
          type: string
        text:
          title: Text
          type: string
      required:
      - id
      - text
      title: JobDescriptionResponse
      type: object
    JobDescriptionUpdate:
      properties:
        text:
          description: Updated job description
          minLength: 1
          title: Text
          type: string
      required:
      - text
      title: JobDescriptionUpdate
      type: object
    ResumeCreate:
      properties:
        text:
          description: Resume content
          minLength: 1
          title: Text
          type: string
      required:
      - text
      title: ResumeCreate
      type: object
    ResumeResponse:
      properties:
        id:
          title: Id
          type: string
        text:
          title: Text
          type: string
      required:
      - id
      - text
      title: ResumeResponse
      type: object
    ResumeUpdate:
      properties:
        text:
          description: Updated resume content
          minLength: 1
          title: Text
          type: string
      required:
      - text
      title: ResumeUpdate
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Service layer and REST API for TailorFit cover letter generation
  title: TailorFit API
  version: 1.0.0
openapi: 3.1.0
paths:
  /:
    get:
      description: Root endpoint - API is running.
      operationId: root__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root
      tags:
      - Root
  /api/cover-letters:
    get:
      description: Retrieve all cover letters from the system
      operationId: get_all_cover_letters_api_cover_letters_get
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CoverLetterResponse'
                title: Response Get All Cover Letters Api Cover Letters Get
                type: array
          description: Successful Response
      summary: Get all cover letters
      tags:
      - TailorFit
    post:
      description: Create a new cover letter with initial content
      operationId: create_cover_letter_api_cover_letters_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoverLetterCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverLetterResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create a new cover letter
      tags:
      - TailorFit
  /api/cover-letters/{letter_id}:
    delete:
      description: Delete a cover letter.
      operationId: delete_cover_letter_api_cover_letters__letter_id__delete
      parameters:
      - in: path
        name: letter_id
        required: true
        schema:
          title: Letter Id
          type: string
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete a cover letter
      tags:
      - TailorFit
    get:
      description: Retrieve a specific cover letter by ID.
      operationId: get_cover_letter_api_cover_letters__letter_id__get
      parameters:
      - in: path
        name: letter_id
        required: true
        schema:
          title: Letter Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverLetterResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get a cover letter by ID
      tags:
      - TailorFit
    put:
      description: Update an existing cover letter.
      operationId: update_cover_letter_api_cover_letters__letter_id__put
      parameters:
      - in: path
        name: letter_id
        required: true
        schema:
          title: Letter Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoverLetterUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverLetterResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update a cover letter
      tags:
      - TailorFit
  /api/cover-letters/{letter_id}/finalize:
    post:
      description: 'Business workflow: Mark cover letter as finalized'
      operationId: finalize_cover_letter_api_cover_letters__letter_id__finalize_post
      parameters:
      - in: path
        name: letter_id
        required: true
        schema:
          title: Letter Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverLetterResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Finalize a cover letter
      tags:
      - TailorFit
  /api/job-descriptions:
    get:
      description: Fetch all job descriptions.
      operationId: get_all_job_descriptions_api_job_descriptions_get
